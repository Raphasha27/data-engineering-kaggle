name: Data Engineering CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check . --fix
        continue-on-error: true

  test:
    name: Run Notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas numpy scikit-learn jupyter nbconvert
      - name: Check notebook outputs
        run: |
          for nb in $(find . -name "*.ipynb" -maxdepth 3); do
            echo "Checking: $nb"
            jupyter nbconvert --to script --stdout "$nb" | python -m py_compile || true
          done
